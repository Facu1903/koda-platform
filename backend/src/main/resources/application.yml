spring:
  application:
    name: koda-platform-api
  datasource:
    url: ${KODA_DB_URL:jdbc:postgresql://localhost:5432/koda_platform}
    username: ${KODA_DB_USERNAME:koda}
    password: ${KODA_DB_PASSWORD:koda_dev_password}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

server:
  port: ${KODA_API_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never
      show-components: always
      validate-group-membership: true
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
          show-details: never
          show-components: always
        readiness:
          include: readinessState,db,kodaSchema
          show-details: never
          show-components: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    db:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name:koda-platform-api}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99
      slo:
        http.server.requests: 100ms,250ms,500ms,1s,2s,5s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.koda.platform: INFO
koda:
  security:
    jwt:
      issuer: ${KODA_JWT_ISSUER:koda-platform}
      secret: ${KODA_JWT_SECRET}
      access-token-ttl: ${KODA_ACCESS_TOKEN_TTL:15m}
      refresh-token-ttl: ${KODA_REFRESH_TOKEN_TTL:30d}
    bootstrap:
      owner-email: ${KODA_BOOTSTRAP_OWNER_EMAIL:}
      owner-password: ${KODA_BOOTSTRAP_OWNER_PASSWORD:}
      owner-display-name: ${KODA_BOOTSTRAP_OWNER_DISPLAY_NAME:KODA Owner}
      tenant-id: ${KODA_BOOTSTRAP_TENANT_ID:00000000-0000-4000-8000-000000000001}
  licensing:
    capabilities-cache:
      enabled: ${KODA_CAPABILITIES_CACHE_ENABLED:true}
      ttl: ${KODA_CAPABILITIES_CACHE_TTL:30s}
      max-size: ${KODA_CAPABILITIES_CACHE_MAX_SIZE:10000}
  audit:
    query:
      max-range: ${KODA_AUDIT_QUERY_MAX_RANGE:P90D}
