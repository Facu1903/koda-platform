name: KODA Platform CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: koda-platform-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend verify
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: backend

    env:
      KODA_JWT_SECRET: ci-secret-ci-secret-ci-secret-32-bytes-minimum
      KODA_JWT_ISSUER: koda-platform

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Verify backend
        run: mvn -B verify

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build