services:
  postgres:
    image: postgres:17-alpine
    container_name: koda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KODA_POSTGRES_DB:-koda_platform}
      POSTGRES_USER: ${KODA_POSTGRES_USER:-koda}
      POSTGRES_PASSWORD: ${KODA_POSTGRES_PASSWORD:-koda_dev_password}
      TZ: UTC
    ports:
      - "${KODA_POSTGRES_PORT:-5432}:5432"
    volumes:
      - koda_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KODA_POSTGRES_USER:-koda} -d ${KODA_POSTGRES_DB:-koda_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: koda-backend
    restart: unless-stopped
    environment:
      KODA_DB_URL: jdbc:postgresql://postgres:5432/${KODA_POSTGRES_DB:-koda_platform}
      KODA_DB_USERNAME: ${KODA_POSTGRES_USER:-koda}
      KODA_DB_PASSWORD: ${KODA_POSTGRES_PASSWORD:-koda_dev_password}
      KODA_API_PORT: 8080
      KODA_JWT_ISSUER: ${KODA_JWT_ISSUER:-koda-platform}
      KODA_JWT_SECRET: ${KODA_JWT_SECRET:?KODA_JWT_SECRET is required}
      KODA_ACCESS_TOKEN_TTL: ${KODA_ACCESS_TOKEN_TTL:-15m}
      KODA_REFRESH_TOKEN_TTL: ${KODA_REFRESH_TOKEN_TTL:-30d}
      KODA_BOOTSTRAP_OWNER_EMAIL: ${KODA_BOOTSTRAP_OWNER_EMAIL:-}
      KODA_BOOTSTRAP_OWNER_PASSWORD: ${KODA_BOOTSTRAP_OWNER_PASSWORD:-}
      KODA_BOOTSTRAP_OWNER_DISPLAY_NAME: ${KODA_BOOTSTRAP_OWNER_DISPLAY_NAME:-KODA Owner}
      KODA_BOOTSTRAP_TENANT_ID: ${KODA_BOOTSTRAP_TENANT_ID:-00000000-0000-4000-8000-000000000001}
    ports:
      - "${KODA_API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: koda-frontend
    restart: unless-stopped
    ports:
      - "${KODA_WEB_PORT:-5173}:80"
    depends_on:
      - backend

volumes:
  koda_postgres_data:
